<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1b2130"/>
      <stop offset="100%" stop-color="#04060a"/>
    </radialGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243046"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <!-- Fondo noir con esquinas redondeadas -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Skyline nocturno de la ciudad -->
  <g fill="#2b3346">
    <rect x="14" y="78" width="12" height="30"/>
    <rect x="28" y="66" width="14" height="42"/>
    <rect x="44" y="86" width="10" height="22"/>
    <rect x="84" y="72" width="13" height="36"/>
    <rect x="99" y="82" width="11" height="26"/>
    <rect x="112" y="70" width="9" height="38"/>
  </g>
  <!-- Ventanas encendidas -->
  <g fill="#dc3333" opacity="0.85">
    <rect x="31" y="72" width="3" height="3"/>
    <rect x="37" y="72" width="3" height="3"/>
    <rect x="31" y="82" width="3" height="3"/>
    <rect x="87" y="78" width="3" height="3"/>
    <rect x="92" y="86" width="3" height="3"/>
  </g>
  <!-- Suelo -->
  <rect x="10" y="106" width="108" height="4" rx="2" fill="#dc3333" opacity="0.55"/>

  <!-- Lupa de investigacion -->
  <g>
    <circle cx="58" cy="52" r="27" fill="url(#lens)"/>
    <circle cx="58" cy="52" r="27" fill="none" stroke="#dc3333" stroke-width="5"/>
    <!-- Reflejo del cristal -->
    <path d="M45 40 a20 20 0 0 1 14 -6" fill="none" stroke="#8a97ad" stroke-width="3"
          stroke-linecap="round" opacity="0.6"/>
    <!-- Ojo de cerradura: el misterio -->
    <g fill="#e6e9ee">
      <circle cx="58" cy="48" r="6"/>
      <path d="M55 52 L61 52 L63 64 L53 64 Z"/>
    </g>
    <!-- Mango -->
    <rect x="76" y="70" width="26" height="9" rx="4.5"
          transform="rotate(45 76 70)" fill="#dc3333"/>
  </g>
</svg>
